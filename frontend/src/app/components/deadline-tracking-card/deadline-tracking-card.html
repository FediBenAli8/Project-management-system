<div class="card">
    <div class="card-header">
        <h2 class="type"> {{deadline.type}}</h2>
    </div>
    <div class="card-body">
        <div class="date-data">
            <p class="deadline">deadline: {{deadline.deadline}}</p>
            <p class="daysLeft">days left: {{deadline.daysLeft}}</p>

        </div>
        <p class="userName">user name: {{deadline.userName}}</p>
        <p class="project">project name: {{deadline.project}}</p>
    </div>
</div>
