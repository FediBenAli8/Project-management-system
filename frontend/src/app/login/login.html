<main class="main-content">
  <section class="auth-card">
    <h1>Log In</h1>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" formControlName="email" />
        <div class="error" *ngIf="f['email'].invalid && f['email'].touched">
          <small *ngIf="f['email'].errors?.['required']">Email is required.</small>
          <small *ngIf="f['email'].errors?.['email']">Please enter a valid email.</small>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" />
        <div class="error" *ngIf="f['password'].invalid && f['password'].touched">
          <small *ngIf="f['password'].errors?.['required']">Password is required.</small>
          <small *ngIf="f['password'].errors?.['minlength']">Minimum 8 characters.</small>
        </div>
      </div>

      <div class="actions">
        <button type="submit" [disabled]="loginForm.invalid || isSubmitting">
          {{ isSubmitting ? 'Signing In...' : 'Login' }}
        </button>
        <a routerLink="/register">Register</a>
      </div>
    </form>
  </section>
</main>
